---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: my-app # The target pods affected by this policy
  policyTypes:
    - Ingress
    - Egress
  ingress: [] # Denies ALL incoming traffic (empty list)
  egress:
    - {}      # Allows ALL outgoing traffic (empty object rule)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
spec:
  podSelector:
    matchLabels:
      app: backend  # TARGET: The Pods receiving the traffic
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend # SOURCE: The Pods allowed to send traffic
---
# https://kubernetes.io/docs/concepts/services-networking/network-policies/
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: test-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      role: db
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - ipBlock: # Must be cluster-external CIDRs
        # E.g., Node or Docker network
        cidr: 172.17.0.0/16
        except:
        - 172.17.1.0/24
    - namespaceSelector:
        matchLabels:
          project: myproject
    - podSelector:
        matchLabels:
          role: frontend
    ports:
    - protocol: TCP
      port: 6379
  egress:
  - to:
    - ipBlock:
        # E.g., Cluster-external (VPC subnet) services
        cidr: 10.0.0.0/24
    ports:
    - protocol: TCP
      port: 5978

